[pytest]
testpaths = tests
addopts =
    --strict-markers
    --tb=short
    -q
    --cov=app.api.frontend
    --cov=app.api.auth.routes
    --cov=app.main
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=90
markers =
    unit: Unit tests (no DB, no network)
    integration: Integration tests (TestClient, mocked external deps)
    slow: Tests that are slow to run
asyncio_mode = auto
