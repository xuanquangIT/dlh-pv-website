# -----------------------------------------------------------------------------
# Canonical metrics — pre-defined SQL templates the LLM picks via recall_metric
# -----------------------------------------------------------------------------

metrics:

  # === System overview ===
  system_overview:
    description: "Fleet-level AGGREGATE KPI only. Returns ONE row of rolled-up numbers — total energy MWh, average capacity factor pct, data completeness pct, count of active sites. NEVER use this when the user asks about per-site details, listings, locations, rankings, or comparisons."
    synonyms: ["tổng quan hệ thống", "tong quan he thong", "system overview", "system kpi", "fleet kpi", "kpi cards", "kpi dashboard", "overall fleet", "fleet aggregate", "aggregate kpi", "rolled-up kpi", "average capacity factor", "avg capacity factor", "fleet capacity factor", "system capacity factor", "tóm tắt hệ thống", "tom tat he thong", "tóm tắt toàn hệ thống"]
    sample_questions:
      - "Cho tôi xem tổng quan hệ thống"
      - "Show fleet KPI for last 7 days"
      - "Tóm tắt hiệu suất hệ thống"
      - "What's the overall fleet KPI"
      - "Fleet-wide rolled-up KPI for the past month"
      - "Tóm tắt KPI toàn hệ thống"
    sql_template: |
      SELECT
        SUM(total_energy_mwh) AS total_energy_mwh,
        AVG(avg_capacity_factor_pct) AS avg_capacity_factor_pct,
        MAX(total_facility_count) AS facility_count,
        MAX(active_facility_count) AS active_facility_count,
        AVG(data_completeness_pct) AS data_completeness_pct,
        COUNT(*) AS window_days
      FROM pv.gold.mart_system_kpi_daily
      WHERE kpi_date >= CURRENT_DATE - INTERVAL '{window_days}' DAY
    parameters:
      - {name: window_days, type: int, default: 30, range: [1, 365]}
    suggested_chart: null   # KPI cards, no chart
    suggested_kpi_cards: ["total_energy_mwh", "avg_capacity_factor_pct", "facility_count", "data_completeness_pct"]

  # === Energy ranking ===
  top_facilities_by_energy:
    description: "Top N trạm theo tổng sản lượng. Use for 'top N facilities', 'top trạm', 'best facilities', 'ranking by energy', 'highest producing facilities'."
    synonyms: ["top facilities", "top facility", "top n facilities", "top 5 facilities", "top 10 facilities", "top trạm", "top tram", "best facilities", "best performing facilities", "top performing facilities", "ranking by energy", "rank facilities", "ranking", "xếp hạng", "xep hang", "tốt nhất", "tot nhat", "cao nhất", "cao nhat", "nhiều nhất", "highest production", "highest producing", "leaderboard", "biggest producers", "largest producers"]
    sample_questions:
      - "Top 5 trạm sản lượng cao nhất 30 ngày qua"
      - "Top 5 facilities by energy in the last 30 days"
      - "Best facilities by energy this month"
      - "Xếp hạng trạm theo sản lượng"
      - "Which facilities produced the most energy"
    sql_template: |
      SELECT facility_name,
             SUM(energy_mwh_daily) AS total_energy_mwh,
             AVG(weighted_capacity_factor_pct) AS avg_capacity_factor_pct
      FROM pv.gold.mart_energy_daily
      WHERE energy_date >= CURRENT_DATE - INTERVAL '{window_days}' DAY
      GROUP BY facility_name
      ORDER BY total_energy_mwh {sort_order}
      LIMIT {n}
    parameters:
      - {name: window_days, type: int, default: 30}
      - {name: n, type: int, default: 5, range: [1, 50]}
      - {name: sort_order, type: enum, values: [DESC, ASC], default: DESC}
    suggested_chart:
      chart_type: bar
      x: facility_name
      y: total_energy_mwh

  facility_energy_contribution:
    description: "Tỉ lệ đóng góp điện năng của từng trạm trong tổng sản lượng. Use for 'tỉ lệ đóng góp', 'energy share', 'contribution ratio', 'phần trăm sản lượng từng trạm'."
    synonyms: [
      "tỉ lệ đóng góp", "ti le dong gop", "tỷ lệ đóng góp", "ty le dong gop",
      "phần trăm sản lượng", "phan tram san luong", "phần trăm điện năng",
      "đóng góp điện năng", "dong gop dien nang", "đóng góp sản lượng",
      "share", "contribution ratio", "energy share", "energy contribution",
      "percentage of total", "share of total", "percent of energy",
      "split by facility", "breakdown by facility", "phân bổ sản lượng",
      "tỉ trọng", "ti trong", "tỷ trọng",
    ]
    sample_questions:
      - "Tỉ lệ đóng góp điện năng của 8 trạm trong hệ thống"
      - "Tỷ lệ đóng góp sản lượng từng trạm"
      - "Energy share by facility"
      - "Contribution ratio per facility"
      - "Phần trăm sản lượng mỗi trạm"
    sql_template: |
      WITH per_facility AS (
        SELECT facility_name,
               SUM(energy_mwh_daily) AS total_energy_mwh
        FROM pv.gold.mart_energy_daily
        WHERE energy_date >= CURRENT_DATE - INTERVAL '{window_days}' DAY
        GROUP BY facility_name
      )
      SELECT facility_name,
             total_energy_mwh,
             ROUND(100.0 * total_energy_mwh / SUM(total_energy_mwh) OVER (), 2) AS share_pct
      FROM per_facility
      ORDER BY total_energy_mwh DESC
    parameters:
      - {name: window_days, type: int, default: 30, range: [1, 365]}
    suggested_chart:
      chart_type: bar
      x: facility_name
      y: share_pct

  wind_impact_on_energy:
    description: "Tác động của tốc độ gió đến hiệu suất sản xuất điện theo từng trạm. Use for 'wind speed impact', 'tác động tốc độ gió', 'ảnh hưởng gió đến sản lượng'."
    synonyms: [
      # Distinctive single tokens — "wind" / "gió" alone should boost this
      # over generic weather correlation metrics.
      "wind", "gió", "gio",
      "wind speed", "tốc độ gió", "toc do gio",
      "tác động tốc độ gió", "tac dong toc do gio",
      "tác động của tốc độ gió", "tac dong cua toc do gio",
      "ảnh hưởng tốc độ gió", "anh huong toc do gio",
      "ảnh hưởng của tốc độ gió", "anh huong cua toc do gio",
      "ảnh hưởng của gió", "anh huong cua gio",
      "tác động của gió", "tac dong cua gio",
      "wind speed impact", "wind impact on energy",
      "impact of wind speed", "impact of wind",
      "wind on production", "wind on energy",
      "wind vs energy", "wind speed vs",
      "tốc độ gió và sản lượng", "toc do gio va san luong",
      "gió và hiệu suất", "gio va hieu suat",
      "gió và sản lượng", "gio va san luong",
    ]
    sample_questions:
      - "Tác động của tốc độ gió đến hiệu suất sản xuất năng lượng PV"
      - "Phân tích ảnh hưởng của tốc độ gió đến hiệu suất"
      - "Ảnh hưởng của gió đến sản lượng từng trạm"
