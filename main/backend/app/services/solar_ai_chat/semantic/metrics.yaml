  facilities_by_performance_ratio:
    description: "Ranking trạm theo Performance Ratio (PR) — tỷ lệ năng lượng thực / lý thuyết. Use for 'PR tốt nhất', 'best performance ratio', 'top facilities by PR'."
    synonyms: [
