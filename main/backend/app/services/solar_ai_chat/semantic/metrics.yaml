             AVG(avg_capacity_factor_pct) AS avg_capacity_factor_pct,
             SUM(total_energy_mwh) AS total_energy_mwh
      FROM pv.gold.mart_weather_impact_daily
      WHERE weather_date >= CURRENT_DATE - INTERVAL '{window_days}' DAY
      GROUP BY facility_name
      ORDER BY avg_wind_speed_ms DESC
    parameters:
      - {name: window_days, type: int, default: 30, range: [1, 365]}
    suggested_chart:
      chart_type: scatter
      x: avg_wind_speed_ms
      y: avg_capacity_factor_pct

  temperature_vs_energy_correlation:
    description: "Tương quan nhiệt độ vs hiệu suất tạo điện (capacity factor). Use for 'tương quan nhiệt độ', 'correlation temperature energy', 'temp vs performance'."
    synonyms: [
      "tương quan nhiệt độ", "tuong quan nhiet do",
      "correlation temperature", "temperature vs energy",
      "temp vs performance", "nhiệt độ và hiệu suất",
      "nhiệt độ và sản lượng", "temperature impact",
      "ảnh hưởng nhiệt độ", "anh huong nhiet do",
      "tương quan", "tuong quan", "correlation",
    ]
    sample_questions:
