version: 1
generated_from: "extracted from solar_ai_chat 14-tool repository as of 2026-04-26"

# -----------------------------------------------------------------------------
# Catalogs / schemas / tables — the LLM's view of the lakehouse
# -----------------------------------------------------------------------------

catalogs:
  pv:
    description: "PV Lakehouse main catalog — Silver (validated raw) + Gold (star schema + KPI marts)."
    schemas:

      silver:
        description: "Validated, deduplicated time-series readings. Use for raw hourly lookups."
        tables:
          energy_readings:
            description: "Hourly energy generation per facility. CAUTION: column is energy_kwh (NOT energy_mwh) — convert to MWh by dividing 1000 if needed. Use for hourly trends, peak hour analysis, capacity factor + performance ratio at hour grain."
            grain: [facility_id, date_hour_local]
            primary_key: [facility_id, date_hour_local]
            partition_columns: [reading_date_local]
            columns:
              - {name: facility_id, type: string, description: "Facility code (WRSF1, AVLSF, ...)"}
              - {name: facility_name, type: string}
              - {name: network_id, type: string}
              - {name: region, type: string}
              - {name: date_hour, type: timestamp, description: "UTC hour timestamp."}
              - {name: date_hour_local, type: timestamp, description: "Local-timezone hour. PREFER this for date filtering."}
              - {name: reading_date, type: date, description: "UTC date."}
              - {name: reading_date_local, type: date, description: "Local date — use in WHERE for fast partitioned filtering."}
              - {name: energy_kwh, type: float, description: "Hourly energy generation in kWh. To get MWh: energy_kwh / 1000."}
              - {name: intervals_count, type: int, description: "How many sub-hourly intervals contributed to this row."}
              - {name: completeness_pct, type: float, description: "Data completeness % within this hour."}
              - {name: capacity_factor_pct, type: float, description: "Capacity factor 0-100%."}
              - {name: performance_ratio_pct, type: float, description: "Performance Ratio % at hour grain."}
              - {name: is_daytime, type: int, description: "1 if hour is daytime (energy expected non-zero), else 0."}
              - {name: quality_flag, type: string, description: "GOOD / WARN / BAD."}
              - {name: quality_issues, type: string}
              - {name: created_at, type: timestamp}
              - {name: updated_at, type: timestamp}
              - {name: batch_id, type: string}
            sample_questions:
              - "Hourly energy trend for AVLSF last week"
              - "Peak production hour today"
              - "Per-facility energy yesterday (sum energy_kwh / 1000)"

          weather:
            description: "Hourly weather observations per facility location — irradiance, cloud, temperature, wind, precipitation."
            grain: [location_id, weather_timestamp_local]
            columns:
              - {name: location_id, type: string, description: "Weather station ID (matches facility_id)."}
              - {name: facility_id, type: string}
              - {name: facility_name, type: string}
              - {name: latitude, type: float}
              - {name: longitude, type: float}
              - {name: weather_timestamp, type: timestamp, description: "UTC observation time."}
              - {name: weather_timestamp_local, type: timestamp, description: "Local-timezone observation time."}
              - {name: weather_date, type: date}
              - {name: weather_date_local, type: date}
              - {name: shortwave_radiation, type: float, description: "Solar shortwave radiation W/m² — primary irradiance metric."}
              - {name: direct_radiation, type: float}
              - {name: diffuse_radiation, type: float}
              - {name: direct_normal_irradiance, type: float, description: "DNI W/m²."}
              - {name: terrestrial_radiation, type: float}
              - {name: solar_irradiance, type: float}
              - {name: temperature_c, type: float, description: "Air temperature °C."}
              - {name: dew_point_c, type: float}
              - {name: humidity_pct, type: float}
              - {name: wind_speed_ms, type: float, description: "Wind speed in m/s."}
              - {name: wind_direction_deg, type: float}
              - {name: wind_gust_ms, type: float}
              - {name: cloud_cover_pct, type: float, description: "Cloud cover 0-100%. Higher = lower solar output."}
              - {name: cloud_cover_low_pct, type: float}
              - {name: cloud_cover_mid_pct, type: float}
              - {name: cloud_cover_high_pct, type: float}
              - {name: precipitation_mm, type: float}
              - {name: sunshine_duration_s, type: float}
              - {name: pressure_msl_hpa, type: float}
              - {name: is_day, type: int}
              - {name: is_valid, type: boolean}
              - {name: quality_flag, type: string}
              - {name: region, type: string}

          air_quality:
            description: "Hourly air quality (AQI + pollutant breakdown) per facility location. Affects solar panel soiling and UV attenuation."
            grain: [location_id, aqi_timestamp_local]
            columns:
              - {name: location_id, type: string}
              - {name: facility_name, type: string}
              - {name: latitude, type: float}
              - {name: longitude, type: float}
              - {name: aqi_timestamp, type: timestamp, description: "UTC observation time."}
              - {name: aqi_timestamp_local, type: timestamp}
              - {name: aqi_date, type: date}
              - {name: aqi_date_local, type: date}
              - {name: aqi_index, type: int, description: "Internal index value."}
              - {name: aqi_value, type: int, description: "US-EPA AQI value (0-500). PREFER this over aqi_index."}
              - {name: aqi_category, type: string, description: "Good / Moderate / Unhealthy / Hazardous."}
              - {name: pm25, type: float, description: "PM2.5 µg/m³."}
              - {name: pm10, type: float}
              - {name: no2, type: float, description: "NO₂ µg/m³."}
              - {name: o3, type: float, description: "Ozone µg/m³."}
              - {name: dust, type: float}
              - {name: sulphur_dioxide, type: float}
              - {name: carbon_monoxide, type: float}
              - {name: uv_index, type: float}
              - {name: uv_index_clear_sky, type: float, description: "Clear-sky UV; compare to uv_index for atmospheric attenuation."}
              - {name: is_valid, type: boolean}
              - {name: quality_flag, type: string}
              - {name: region, type: string}

          facility_status:
            description: "SCD Type 2 facility metadata snapshots — capacity, location, status with effective_from/effective_to. Filter is_current=TRUE for latest record."
            grain: [facility_id, effective_from]
            columns:
              - {name: facility_id, type: string}
              - {name: facility_name, type: string}
              - {name: network_id, type: string}
              - {name: region, type: string}
              - {name: state, type: string}
              - {name: location_lat, type: float}
              - {name: location_lng, type: float}
              - {name: unit_count, type: int}
              - {name: rated_capacity_kw, type: float}
              - {name: capacity_registered_kw, type: float}
              - {name: capacity_maximum_kw, type: float}
              - {name: technology_type, type: string}
              - {name: status, type: string}
              - {name: effective_from, type: timestamp}
              - {name: effective_to, type: timestamp}
              - {name: is_current, type: boolean, description: "TRUE for the active record. Always filter on this for current state."}

          data_quality_log:
            description: "Per-rule quality check log written by Silver curation jobs."
            grain: [check_timestamp, rule_name, table_name]
            columns:
              - {name: log_id, type: string}
              - {name: batch_id, type: string}
              - {name: table_name, type: string}
              - {name: rule_name, type: string}
              - {name: rule_type, type: string, description: "duplicate_check / null_check / freshness_check / range_check."}
              - {name: status, type: string, description: "PASSED / FAILED / WARN."}
              - {name: total_rows, type: int}
              - {name: failed_rows, type: int}
              - {name: failed_rate, type: float}
              - {name: threshold_value, type: float}
              - {name: detail, type: string}
              - {name: check_timestamp, type: timestamp}
              - {name: check_date, type: date}

      gold:
        description: "Star schema (dim_*, fact_*) + pre-computed KPI marts. Use for ranking, summaries, dashboards."
        tables:
          dim_facility:
            description: "Facility master with location, capacity. SCD Type 2 — filter is_current=TRUE for latest. Has location_lat+location_lng → enables map visualization."
            primary_key: facility_sk
            columns:
              - {name: facility_sk, type: bigint, description: "Surrogate key (use in joins)."}
              - {name: facility_id, type: string, description: "Business key (WRSF1, AVLSF, ...)"}
              - {name: facility_name, type: string}
              - {name: facility_code, type: string}
              - {name: network_id, type: string, description: "Grid/network ID."}
              - {name: region, type: string}
              - {name: state, type: string}
              - {name: location_lat, type: double, description: "GPS latitude. PRESENCE OF location_lat+location_lng ENABLES MAP RENDERING."}
              - {name: location_lng, type: double, description: "GPS longitude."}
              - {name: total_capacity_mw, type: double, description: "Total installed capacity in MW (preferred)."}
              - {name: rated_capacity_kw, type: double}
              - {name: capacity_registered_kw, type: double}
              - {name: capacity_maximum_kw, type: double}
              - {name: technology_type, type: string}
              - {name: status, type: string}
              - {name: is_current, type: boolean, description: "SCD2 — TRUE for the active record. Always filter on this."}
              - {name: is_active, type: boolean}
              - {name: valid_from, type: timestamp}
              - {name: valid_to, type: timestamp}
            sample_questions:
              - "Where are the facilities located?"
              - "Show me a map"
              - "List all facilities with their capacity"
              - "What region is each station in?"

          fact_energy:
            description: "Hourly energy fact table — joins to dim_facility, dim_date, dim_time. Use for analytics aggregations."
            grain: [facility_sk, date_hour_local]
            columns:
              - {name: facility_sk, type: bigint}
              - {name: facility_id, type: string}
              - {name: facility_name, type: string}
              - {name: date_hour_local, type: timestamp}
              - {name: reading_date_local, type: date}
              - {name: energy_mwh, type: numeric}
              - {name: predicted_energy_mwh, type: numeric, description: "ML model prediction for this hour."}
              - {name: capacity_factor_pct, type: numeric}
              - {name: performance_ratio_pct, type: numeric, description: "Hourly Performance Ratio %."}
              - {name: weather_condition_key, type: integer}

          mart_energy_daily:
            description: "Per-facility daily energy totals, capacity factor, performance ratio, weather + AQI averages, data quality. Pre-aggregated — faster than fact_energy for daily questions."
            grain: [facility_id, energy_date]
            columns:
              - {name: facility_id, type: string}
              - {name: facility_name, type: string}
              - {name: region, type: string}
              - {name: state, type: string}
              - {name: energy_date, type: date, description: "Date partition. Use in WHERE for filtering."}
              - {name: energy_mwh_daily, type: double, description: "Total daily energy in MWh."}
              - {name: energy_kwh_daily, type: double}
              - {name: rated_capacity_mw, type: double}
              - {name: weighted_capacity_factor_pct, type: double, description: "Weighted capacity factor (preferred over peak)."}
              - {name: peak_capacity_factor_pct, type: double}
              - {name: peak_production_hour_utc, type: int}
              - {name: peak_production_hour_local, type: int}
              - {name: specific_yield_kwh_per_kwp, type: double, description: "kWh per kW installed — yield metric."}
              - {name: daytime_hours_above_threshold, type: int}
              - {name: zero_daytime_hours, type: int}
              - {name: night_energy_events, type: int}
              - {name: avg_shortwave_radiation, type: double, description: "Solar irradiance proxy (W/m²)."}
              - {name: avg_direct_normal_irradiance, type: double}
              - {name: avg_cloud_cover_pct, type: double}
              - {name: avg_temperature_c, type: double}
              - {name: max_temperature_c, type: double}
              - {name: avg_precipitation_mm, type: double}
              - {name: total_precipitation_mm, type: double}
              - {name: avg_aqi_value, type: double}
              - {name: dominant_aqi_category, type: string}
              - {name: dominant_weather_condition, type: string}
              - {name: daily_insolation_kwh_m2, type: double}
              - {name: performance_ratio_pct, type: double, description: "Performance Ratio % — actual / theoretical energy. Higher is better."}
              - {name: completeness_pct_daily, type: double, description: "Data completeness % for the day."}
              - {name: good_quality_row_pct, type: double}
              - {name: warning_quality_row_pct, type: double}
              - {name: bad_quality_row_pct, type: double}
              - {name: facility_rank_by_energy, type: int}
              - {name: facility_rank_by_cf, type: int}
              - {name: batch_id, type: string}
              - {name: created_at, type: timestamp}
              - {name: updated_at, type: timestamp}
            sample_questions:
              - "Top 5 facilities by energy last 30 days"
              - "Daily capacity factor trend"
              - "Performance Ratio per facility"

          mart_system_kpi_daily:
            description: "System-wide daily KPIs — total production, fleet availability, data quality, weather averages, champion ML model metrics, forecast for next 3 days."
            grain: [kpi_date]
            columns:
              - {name: kpi_date, type: date, description: "Date — use in WHERE for filtering."}
              - {name: total_facility_count, type: int}
              - {name: active_facility_count, type: int}
              - {name: fleet_availability_pct, type: double}
              - {name: total_energy_mwh, type: double}
              - {name: total_energy_kwh, type: double}
              - {name: avg_capacity_factor_pct, type: double}
              - {name: peak_capacity_factor_pct, type: double}
              - {name: peak_production_hour_utc, type: int}
              - {name: peak_production_hour_local, type: int}
              - {name: specific_yield_kwh_per_kwp, type: double}
              - {name: daytime_hours_count, type: int}
              - {name: avg_shortwave_radiation, type: double}
              - {name: avg_direct_normal_irradiance, type: double}
              - {name: avg_cloud_cover_pct, type: double}
              - {name: avg_temperature_c, type: double}
              - {name: avg_precipitation_mm, type: double}
              - {name: avg_aqi_value, type: double}
              - {name: dominant_aqi_category, type: string}
              - {name: dominant_weather_condition, type: string}
              - {name: data_completeness_pct, type: double}
              - {name: good_quality_row_pct, type: double}
              - {name: warning_quality_row_pct, type: double}
              - {name: bad_quality_row_pct, type: double}
              - {name: champion_model_name, type: string}
              - {name: champion_model_version, type: string}
              - {name: champion_r2, type: double}
              - {name: champion_skill_score, type: double}
              - {name: champion_nrmse_pct, type: double}
              - {name: champion_mape_day_pct, type: double}
              - {name: forecast_next_day_mwh, type: double, description: "Predicted total energy for D+1 (next day). The mart only carries D+1, D+2, D+3 — for D+5 / D+7 use pv.gold.forecast_daily directly."}
              - {name: forecast_day2_mwh, type: double, description: "Predicted total energy for D+2."}
              - {name: forecast_day3_mwh, type: double, description: "Predicted total energy for D+3."}
              - {name: batch_id, type: string}
              - {name: created_at, type: timestamp}
              - {name: updated_at, type: timestamp}
            sample_questions:
              - "Give me a system overview"
              - "Total production yesterday"
              - "Forecast next 3 days from system KPI"

          mart_weather_impact_daily:
            description: "Daily weather × energy impact per facility — cloud/temp/wind/humidity bands + radiation-to-energy efficiency. Use for weather correlation questions."
            grain: [facility_id, weather_date]
            columns:
              - {name: facility_id, type: string}
              - {name: facility_name, type: string}
              - {name: region, type: string}
              - {name: weather_date, type: date}
              - {name: cloud_band, type: string, description: "Bucketed cloud cover (low/medium/high)."}
              - {name: temperature_band, type: string}
              - {name: rain_band, type: string}
              - {name: weather_condition_description, type: string}
              - {name: observation_hours, type: int}
              - {name: daytime_observation_hours, type: int}
              - {name: avg_energy_mwh_per_hour, type: double}
              - {name: total_energy_mwh, type: double}
              - {name: avg_capacity_factor_pct, type: double}
              - {name: avg_shortwave_radiation, type: double}
              - {name: avg_direct_normal_irradiance, type: double}
              - {name: avg_diffuse_radiation, type: double}
              - {name: avg_cloud_cover_pct, type: double}
              - {name: avg_temperature_c, type: double}
              - {name: avg_humidity_pct, type: double}
              - {name: avg_wind_speed_ms, type: double, description: "Wind speed in m/s."}
              - {name: total_precipitation_mm, type: double}
              - {name: radiation_to_energy_ratio, type: double}
              - {name: clear_sky_energy_loss_mwh, type: double}
              - {name: batch_id, type: string}
              - {name: created_at, type: timestamp}
              - {name: updated_at, type: timestamp}

          mart_aqi_impact_daily:
            description: "Daily air quality × energy impact per facility — AQI breakdown + UV/radiation attenuation."
            grain: [facility_id, aqi_date]
            columns:
              - {name: facility_id, type: string}
              - {name: facility_name, type: string}
              - {name: region, type: string}
              - {name: aqi_date, type: date}
              - {name: aqi_category, type: string, description: "Good / Moderate / Unhealthy etc."}
              - {name: aqi_category_key, type: int}
              - {name: observation_hours, type: int}
              - {name: daytime_observation_hours, type: int}
              - {name: avg_aqi_value, type: double}
              - {name: max_aqi_value, type: double}
              - {name: avg_pm25, type: double}
              - {name: avg_pm10, type: double}
              - {name: avg_no2, type: double}
              - {name: avg_o3, type: double}
              - {name: avg_dust, type: double}
              - {name: avg_uv_index, type: double}
              - {name: avg_uv_index_clear_sky, type: double}
              - {name: uv_attenuation_ratio, type: double}
              - {name: avg_energy_mwh_per_hour, type: double}
              - {name: avg_capacity_factor_pct, type: double}
              - {name: avg_shortwave_radiation, type: double}
              - {name: radiation_efficiency_ratio, type: double}
              - {name: estimated_aqi_energy_loss_pct, type: double}
              - {name: batch_id, type: string}
              - {name: created_at, type: timestamp}
              - {name: updated_at, type: timestamp}

          mart_forecast_accuracy_daily:
            description: "ML forecast accuracy per facility per day — R²/RMSE/MAE/NRMSE/skill score, with 7-day rolling averages and version-over-version deltas."
            grain: [facility_id, eval_date]
            columns:
              - {name: facility_id, type: string}
              - {name: facility_name, type: string}
              - {name: region, type: string}
              - {name: eval_date, type: date}
              - {name: model_name, type: string}
              - {name: model_version, type: string}
              - {name: approach, type: string, description: "A/B/C/D/E benchmark approach."}
              - {name: algorithm, type: string, description: "Ridge / GBT / RF / Stacking."}
              - {name: is_champion, type: boolean}
              - {name: is_fallback, type: boolean}
              - {name: daytime_rows, type: int}
              - {name: r2, type: double, description: "Coefficient of determination (regression, can go negative)."}
              - {name: rmse_mwh, type: double}
              - {name: mae_mwh, type: double}
              - {name: nrmse_pct, type: double}
              - {name: nmae_pct, type: double}
              - {name: mape_day_pct, type: double}
              - {name: skill_score, type: double, description: "Skill vs persistence baseline; positive = better than persistence."}
              - {name: mean_capacity_mw, type: double}
              - {name: r2_7d_avg, type: double}
              - {name: nrmse_7d_avg, type: double}
              - {name: skill_score_7d_avg, type: double}
              - {name: r2_vs_prev_version, type: double}
              - {name: rmse_vs_prev_version, type: double}
              - {name: forecast_accuracy_grade, type: string, description: "A / B / C / D / F human-readable grade."}
              - {name: generated_at_utc, type: timestamp}
              - {name: batch_id, type: string}

          forecast_daily:
            description: "Daily energy forecast per facility — predicted vs actual, with 4 horizon-specific models (D+1, D+3, D+5, D+7). For ad-hoc 'next 7 days' rollups use forecast_horizon=7 (gives the day-7 prediction); to get the timeline use forecast_horizon IN (1,3,5,7) and ORDER BY forecast_date."
            grain: [facility_id, forecast_date, forecast_horizon]
            columns:
              - {name: forecast_daily_id, type: string}
              - {name: facility_id, type: string}
              - {name: forecast_date, type: date, description: "Calendar date the forecast targets."}
              - {name: predicted_energy_mwh_daily, type: double}
              - {name: actual_energy_mwh_daily, type: double, description: "Backfilled once the day passes; NULL for future dates."}
              - {name: predicted_capacity_factor_daily, type: double}
              - {name: model_name, type: string, description: "One of: pv.gold.daily_forecast_d1 / _d3 / _d5 / _d7 (horizon-specific) or pv.gold.energy_forecast_champion (legacy backfill)."}
              - {name: model_version, type: string}
              - {name: generated_at_utc, type: timestamp}
              - {name: batch_id, type: string}
              - {name: forecast_horizon, type: int, description: "Days ahead at generation time. Discrete values 1, 3, 5, 7 (each backed by its own registered model). NULL on legacy pre-2026-04 rows."}
            sample_questions:
              - "Dự báo sản lượng 7 ngày tới"
              - "Tomorrow's predicted production"
              - "Forecast accuracy yesterday"
              - "Forecast for D+5 by facility"

          model_monitoring_daily:
            description: "Champion model regression metrics over time — R², RMSE, MAE, NRMSE, skill score per facility per eval_date."
            grain: [facility_id, eval_date]
            columns:
              - {name: monitoring_id, type: string}
              - {name: facility_id, type: string}
              - {name: eval_date, type: date}
              - {name: model_name, type: string}
              - {name: model_version, type: string}
              - {name: approach, type: string}
              - {name: daytime_rows, type: int}
              - {name: r2, type: double, description: "R² (regression metric)."}
              - {name: rmse_mwh, type: double}
              - {name: mae_mwh, type: double}
              - {name: nrmse_pct, type: double}
              - {name: nmae_pct, type: double}
              - {name: mape_day_pct, type: double}
              - {name: skill_score, type: double}
              - {name: mean_capacity_mw, type: double}
              - {name: generated_at_utc, type: timestamp}
              - {name: batch_id, type: string}

          pipeline_run_diagnostics:
            description: "Per-pipeline run health — bronze/silver/gold stage row counts, status, failures."
            grain: [pipeline_name, run_timestamp_utc]
            columns:
              - {name: diagnostic_id, type: string}
              - {name: pipeline_name, type: string, description: "ingestion / transformation / warehouse / ml / maintenance."}
              - {name: status, type: string, description: "SUCCESS / FAILED / RUNNING / SKIPPED."}
              - {name: lookback_hours, type: int}
              - {name: run_timestamp_utc, type: timestamp}
              - {name: run_date, type: date}
              - {name: bronze_ingest_events, type: int}
              - {name: bronze_failed_events, type: int}
              - {name: silver_quality_checks, type: int}
              - {name: silver_quality_failed_checks, type: int}
              - {name: gold_monitoring_records, type: int}
              - {name: forecast_hourly_rows_generated, type: int}
              - {name: forecast_daily_rows_generated, type: int}
              - {name: detail, type: string, description: "Free-text diagnostic detail."}

          dim_date:
            description: "Conformed date dimension — calendar lookups, fiscal periods."
            grain: [date_key]
            columns:
