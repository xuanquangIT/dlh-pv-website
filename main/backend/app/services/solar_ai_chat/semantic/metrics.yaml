      "versus", "vs", "vs.", "đối chiếu trạm",
      "difference between", "khác nhau", "khac nhau",
      "giữa hai trạm", "giua hai tram", "giữa 2 trạm",
      "Darlington", "Avonlie", "DARLSF vs", "AVLSF vs",
      "so sánh sản lượng", "so sánh hiệu suất", "so sánh công suất",
      "Darlington Point vs Avonlie", "Darlington vs Avonlie",
    ]
    sample_questions:
      - "So sánh trạm Darlington Point và Avonlie"
      - "Compare Darlington Point and Avonlie facilities"
      - "DARLSF vs AVLSF — capacity, energy, capacity factor"
      - "Sự khác nhau giữa DARLSF và AVLSF về hiệu suất"
      - "Which is better: DARLSF or AVLSF"
      - "Compare AVLSF and WRSF1 energy performance"
    sql_template: |
      WITH meta AS (
        SELECT facility_id, facility_name,
               total_capacity_mw, region, state,
               location_lat, location_lng, technology_type
        FROM pv.gold.dim_facility
        WHERE is_current = TRUE
          AND facility_id IN ('{facility_id_1}', '{facility_id_2}')
      ),
      energy AS (
        SELECT facility_id,
               ROUND(SUM(energy_mwh_daily), 2)              AS total_energy_mwh,
               ROUND(AVG(weighted_capacity_factor_pct), 2)  AS avg_cf_pct,
               ROUND(AVG(performance_ratio_pct), 2)         AS avg_pr_pct,
               ROUND(AVG(avg_shortwave_radiation), 1)       AS avg_irradiance_w_m2,
               ROUND(AVG(avg_cloud_cover_pct), 1)           AS avg_cloud_pct,
               ROUND(AVG(avg_temperature_c), 1)             AS avg_temp_c
        FROM pv.gold.mart_energy_daily
        WHERE energy_date >= CURRENT_DATE - INTERVAL '{window_days}' DAY
          AND facility_id IN ('{facility_id_1}', '{facility_id_2}')
        GROUP BY facility_id
      )
      SELECT m.facility_name,
             m.total_capacity_mw    AS capacity_mw,
             m.region,
             m.state,
             e.total_energy_mwh,
             e.avg_cf_pct           AS avg_capacity_factor_pct,
             e.avg_pr_pct           AS avg_performance_ratio_pct,
             e.avg_irradiance_w_m2,
             e.avg_cloud_pct        AS avg_cloud_cover_pct,
             e.avg_temp_c           AS avg_temperature_c
      FROM meta m
      JOIN energy e ON m.facility_id = e.facility_id
      ORDER BY m.facility_name
    parameters:
      - {name: facility_id_1, type: string, description: "First facility code (e.g. DARLSF). Required."}
      - {name: facility_id_2, type: string, description: "Second facility code (e.g. AVLSF). Required."}
      - {name: window_days, type: int, default: 30, range: [1, 365]}
    suggested_chart:
      chart_type: bar
      x: facility_name
      y: total_energy_mwh

  # === Forecast (D+1, D+3, D+5, D+7 horizon-specific models) ===
  forecast_7d:
    description: "Dự báo sản lượng tới 7 ngày (D+1, D+3, D+5, D+7) cho toàn hệ thống — ML pipeline registers một model riêng cho mỗi horizon. Use for 'dự báo 7 ngày', 'forecast next week', 'D+5/D+7', 'predicted next days'."
    synonyms: [
      "dự báo", "du bao", "forecast", "predict", "predicted",
      "dự đoán", "du doan", "tomorrow", "ngày mai", "ngay mai",
      "7 ngày tới", "7 ngay toi", "next 7 days", "next week",
      "tuần tới", "tuan toi", "tuần này", "tuan nay",
      "D+1", "D+3", "D+5", "D+7", "horizon",
      "5 ngày", "5 ngay", "5 days",
    ]
    sample_questions:
      - "Dự báo sản lượng 7 ngày tới"
      - "Forecast next 7 days production"
      - "Sản lượng dự kiến tuần tới"
      - "Predicted energy for D+5"
    sql_template: |
      SELECT forecast_date,
             SUM(predicted_energy_mwh_daily) AS predicted_energy_mwh,
             MAX(forecast_horizon) AS horizon
      FROM pv.gold.forecast_daily
      WHERE forecast_date >= CURRENT_DATE
        AND forecast_date <= CURRENT_DATE + INTERVAL '{horizon_days}' DAY
        AND forecast_horizon IS NOT NULL
      GROUP BY forecast_date
      ORDER BY forecast_date
    parameters:
      - {name: horizon_days, type: int, default: 7, range: [1, 7]}
    suggested_chart:
      chart_type: line
      x: forecast_date
      y: predicted_energy_mwh

  forecast_per_facility_7d:
    description: "Dự báo per-facility cho 7 ngày tới (D+1..D+7). Use when user wants per-station forecast breakdown."
    synonyms: [
      "dự báo per trạm", "dự báo theo trạm", "dự báo từng trạm",
      "forecast per facility", "per station forecast",
      "breakdown forecast", "từng trạm dự báo",
      "facility forecast", "per-facility 7 day",
    ]
    sample_questions:
      - "Dự báo từng trạm 7 ngày tới"
      - "Per-facility forecast breakdown D+1 to D+7"
      - "Dự báo theo trạm tuần tới"
    sql_template: |
      SELECT f.facility_name,
             f.facility_id,
             d.forecast_date,
             d.forecast_horizon,
             d.predicted_energy_mwh_daily AS predicted_mwh
      FROM pv.gold.forecast_daily d
      JOIN pv.gold.dim_facility f
        ON f.facility_id = d.facility_id
       AND f.is_current = TRUE
      WHERE d.forecast_date >= CURRENT_DATE
        AND d.forecast_date <= CURRENT_DATE + INTERVAL '{horizon_days}' DAY
        AND d.forecast_horizon IS NOT NULL
      ORDER BY f.facility_name, d.forecast_date
    parameters:
      - {name: horizon_days, type: int, default: 7, range: [1, 7]}
    suggested_chart:
      chart_type: line
      x: forecast_date
      y: predicted_mwh
      color: facility_name

  forecast_by_horizon:
    description: "So sánh dự báo theo từng horizon (D+1 vs D+3 vs D+5 vs D+7) cho 1 ngày target. Use when user asks 'how does the D+7 prediction compare to D+1' for the same date — measures forecast stability."
    synonyms: [
      "so sánh horizon", "so sanh horizon",
      "compare horizon", "horizon comparison",
      "D+1 vs D+7", "stability forecast",
      "forecast drift", "độ ổn định dự báo",
    ]
    sample_questions:
      - "So sánh dự báo D+1, D+3, D+5, D+7 cho ngày mai"
      - "Compare forecast at different horizons for next week"
      - "Forecast drift between D+1 and D+7"
    sql_template: |
      SELECT forecast_date,
             forecast_horizon,
             SUM(predicted_energy_mwh_daily) AS predicted_energy_mwh
      FROM pv.gold.forecast_daily
      WHERE forecast_date >= CURRENT_DATE
        AND forecast_date <= CURRENT_DATE + INTERVAL '7' DAY
        AND forecast_horizon IN (1, 3, 5, 7)
      GROUP BY forecast_date, forecast_horizon
      ORDER BY forecast_date, forecast_horizon
    parameters: []
    suggested_chart:
      chart_type: line
      x: forecast_date
      y: predicted_energy_mwh
      color: forecast_horizon

  model_metadata:
    description: "Thông tin model ML hiện tại: tên, version, approach, accuracy metrics (R², RMSE, NRMSE, skill_score) cho mỗi horizon (D+1, D+3, D+5, D+7). Use when user asks about 'model nào đang dùng', 'phiên bản model', 'độ chính xác model', 'thông tin model', 'current model', 'model info'."
    synonyms: [
      "thông tin model", "thong tin model",
      "model nào", "model nao", "phiên bản model", "phien ban model",
      "độ chính xác model", "do chinh xac model",
      "model info", "current model", "champion model",
      "model version", "which model", "what model",
      "model performance", "model metadata",
      "metadata model", "ml model info",
      "horizon model", "model horizon",
    ]
    sample_questions:
      - "Mô hình ML hiện tại đang dùng là gì?"
      - "Thông tin model dự báo D+1, D+3, D+5, D+7"
      - "What ML model is currently in production?"
      - "Show me the champion model + accuracy per horizon"
      - "Phiên bản model dự báo và R², RMSE bao nhiêu?"
    sql_template: |
      -- model_monitoring_daily mixes grains: some rows are facility-level
      -- (one per facility_id, one per model+date), some are system-level
      -- (facility_id='ALL'). To get one stable row per horizon we pick the
      -- latest eval_date per model_name, then aggregate ALL facilities of
      -- that date so the displayed R² / RMSE represent the SYSTEM, not an
      -- arbitrary per-facility row chosen by ROW_NUMBER.
      WITH latest_date AS (
        SELECT model_name, MAX(eval_date) AS eval_date
        FROM pv.gold.model_monitoring_daily
        WHERE eval_date >= CURRENT_DATE - INTERVAL '{window_days}' DAY
          AND model_name LIKE 'pv.gold.daily_forecast_%'
        GROUP BY model_name
      ),
      with_version AS (
        SELECT m.model_name, m.eval_date,
               MAX(m.model_version) AS model_version,
               MAX(m.approach)      AS approach,
               AVG(m.r2)            AS r2,
               AVG(m.rmse_mwh)      AS rmse_mwh,
               AVG(m.nrmse_pct)     AS nrmse_pct,
               AVG(m.mape_day_pct)  AS mape_day_pct,
               AVG(m.skill_score)   AS skill_score,
               COUNT(*)             AS facility_count
        FROM pv.gold.model_monitoring_daily m
        JOIN latest_date d
          ON m.model_name = d.model_name AND m.eval_date = d.eval_date
        GROUP BY m.model_name, m.eval_date
      )
      SELECT model_name,
             CAST(REGEXP_EXTRACT(model_name, 'd(\\d+)$', 1) AS INT) AS horizon_days,
             model_version,
             approach,
             eval_date,
             ROUND(r2, 3)             AS r2,
             ROUND(rmse_mwh, 2)       AS rmse_mwh,
             ROUND(nrmse_pct, 2)      AS nrmse_pct,
             ROUND(mape_day_pct, 2)   AS mape_pct,
             ROUND(skill_score, 3)    AS skill_score,
             facility_count
      FROM with_version
      ORDER BY horizon_days
    parameters:
      - {name: window_days, type: int, default: 7, range: [1, 30]}
    suggested_chart: null
    suggested_kpi_cards: ["model_name", "model_version", "r2", "rmse_mwh", "nrmse_pct", "skill_score"]

  # === Per-station reports ===
  station_daily_report:
    description: "Báo cáo hàng ngày cho 1 trạm (sản lượng, capacity factor, chất lượng dữ liệu) trong N ngày qua. Use for 'báo cáo trạm', 'station daily report', 'daily report this week'."
    synonyms: ["station daily report", "báo cáo trạm", "bao cao tram", "daily report", "báo cáo hàng ngày", "bao cao hang ngay", "this week", "tuần này", "tuan nay", "last week", "tuần qua", "tuan qua", "report for station", "báo cáo cho trạm"]
    sample_questions:
      - "Daily station report for this week"
      - "Báo cáo hàng ngày cho trạm AVLSF tuần này"
      - "Show me the daily report for WRSF1 last 7 days"
      - "Báo cáo sản lượng hàng ngày 7 ngày qua"
    sql_template: |
      SELECT m.energy_date,
             m.facility_name,
             m.energy_mwh_daily AS total_energy_mwh,
             m.weighted_capacity_factor_pct AS capacity_factor_pct,
             m.completeness_pct_daily AS data_completeness_pct
      FROM pv.gold.mart_energy_daily m
      WHERE m.energy_date >= CURRENT_DATE - INTERVAL '{window_days}' DAY
        AND ('{facility_id}' = '' OR m.facility_id = '{facility_id}')
      ORDER BY m.energy_date DESC, m.facility_name
    parameters:
      - {name: window_days, type: int, default: 7, range: [1, 90]}
      - {name: facility_id, type: string, default: "", description: "Optional facility code; '' = all stations"}
    suggested_chart:
      chart_type: line
      x: energy_date
      y: total_energy_mwh
      color: facility_name

  station_hourly_report:
    description: "Báo cáo theo giờ cho 1 trạm trong N ngày qua. Use for 'hourly report', 'theo giờ', 'giờ qua'."
    synonyms: ["hourly report", "theo giờ", "theo gio", "by hour", "hourly trend per station", "báo cáo theo giờ", "bao cao theo gio", "trong giờ qua", "trong gio qua"]
    sample_questions:
      - "Hourly report for AVLSF last 24 hours"
      - "Báo cáo theo giờ cho trạm WRSF1"
      - "Show hourly production for Bomen last 3 days"
    sql_template: |
      SELECT date_hour_local,
             facility_name,
             energy_mwh,
             capacity_factor_pct
      FROM pv.gold.fact_energy
      WHERE date_hour_local >= CURRENT_TIMESTAMP - INTERVAL '{window_days}' DAY
        AND ('{facility_id}' = '' OR facility_id = '{facility_id}')
      ORDER BY date_hour_local DESC, facility_name
    parameters:
      - {name: window_days, type: int, default: 3, range: [1, 14]}
      - {name: facility_id, type: string, default: "", description: "Optional facility code; '' = all stations"}
    suggested_chart:
      chart_type: line
      x: date_hour_local
      y: energy_mwh
      color: facility_name

  # === Extreme values ===
  extreme_aqi:
    description: "Top/bottom AQI readings trong window. Use for 'AQI cao nhất', 'worst air quality'."
    synonyms: ["aqi", "air quality", "chất lượng không khí", "chat luong khong khi", "ô nhiễm", "o nhiem", "pollution", "pm25", "pm2.5", "pm10", "khói bụi"]
    sample_questions:
      - "AQI cao nhất tuần qua ở đâu"
      - "Worst air quality readings last 30 days"
      - "Mức ô nhiễm cao nhất"
    sql_template: |
      SELECT location_id,
             aqi_timestamp_local AS observed_at,
             aqi_value,
             pm25,
             pm10
      FROM pv.silver.air_quality
      WHERE aqi_timestamp_local >= CURRENT_DATE - INTERVAL '{window_days}' DAY
        AND aqi_value IS NOT NULL
      ORDER BY aqi_value {sort_order}
      LIMIT {n}
    parameters:
      - {name: window_days, type: int, default: 30}
      - {name: n, type: int, default: 5}
      - {name: sort_order, type: enum, values: [DESC, ASC], default: DESC}
    suggested_chart:
      chart_type: bar
      x: location_id
      y: aqi

  extreme_weather:
    description: "Top/bottom giá trị weather (gió, mây, nhiệt độ) per facility. Use for 'gió mạnh nhất', 'cloudiest day', 'wind speed ranking'."
    synonyms: ["gió mạnh", "gio manh", "wind speed", "tốc độ gió", "toc do gio", "mây nhiều", "may nhieu", "cloudy", "cloud cover", "nhiệt độ cao", "nhiet do cao", "temperature", "thời tiết khắc nghiệt", "thoi tiet", "weather extreme", "humidity", "độ ẩm", "do am"]
    sample_questions:
      - "Trạm nào có tốc độ gió cao nhất, vẽ biểu đồ"
      - "Highest wind speed by facility"
      - "Ngày nào nhiều mây nhất"
      - "Top temperature readings"
    sql_template: |
      SELECT COALESCE(facility_name, location_id) AS facility,
             weather_timestamp_local AS observed_at,
             {value_column} AS metric_value
      FROM pv.silver.weather
      WHERE weather_timestamp_local >= CURRENT_DATE - INTERVAL '{window_days}' DAY
        AND {value_column} IS NOT NULL
      ORDER BY {value_column} {sort_order}
      LIMIT {n}
    parameters:
      - {name: window_days, type: int, default: 30}
      - {name: value_column, type: enum, values: [wind_speed_ms, cloud_cover_pct, temperature_c, humidity_pct], default: wind_speed_ms}
      - {name: n, type: int, default: 5}
      - {name: sort_order, type: enum, values: [DESC, ASC], default: DESC}
    suggested_chart:
      chart_type: bar
      x: facility
      y: metric_value

  extreme_energy:
    description: "Top/bottom hourly energy readings. Use for 'sản lượng cao nhất ngày nào', 'peak production hour'."
    synonyms: ["sản lượng cao nhất", "san luong cao nhat", "peak production", "highest energy", "kỷ lục", "ky luc", "record production", "max output", "min output", "thấp nhất sản lượng"]
    sample_questions:
      - "Sản lượng cao nhất ngày nào tháng qua"
      - "Peak hourly energy reading"
      - "Lowest production hours"
    sql_template: |
      SELECT COALESCE(facility_name, facility_id) AS facility,
             date_hour_local AS observed_at,
             energy_kwh
      FROM pv.silver.energy_readings
      WHERE date_hour_local >= CURRENT_DATE - INTERVAL '{window_days}' DAY
        AND energy_kwh IS NOT NULL
      ORDER BY energy_kwh {sort_order}
      LIMIT {n}
    parameters:
      - {name: window_days, type: int, default: 30}
      - {name: n, type: int, default: 5}
      - {name: sort_order, type: enum, values: [DESC, ASC], default: DESC}

  # === ML model info: see `model_metadata` above ===
  # The legacy `ml_model_metrics` was removed in the D+1→D+7 cutover —
  # its `LIMIT 1` collapsed all 4 horizon-specific models into one row, and
  # `AVG()` over facility_id silently squashed the 8-facility dimension.
  # Use `model_metadata` instead — it returns one row per horizon (D+1, D+3,
  # D+5, D+7) with proper rounding and horizon extracted from model_name.

  # === Pipeline status ===
  pipeline_recent_runs:
    description: "Recent pipeline run health (success/failed counts). Use for 'pipeline status', 'có job nào fail không'."
    synonyms: ["pipeline", "job", "status", "ingestion", "etl", "run history", "fail", "failed", "lỗi job", "loi job", "tình trạng pipeline", "tinh trang pipeline", "data flow"]
    sample_questions:
      - "Pipeline có job nào fail không"
      - "Recent ETL run status"
      - "Tình trạng ingestion 24h qua"
    sql_template: |
      SELECT pipeline_name,
             status,
             COUNT(*) AS run_count,
             MAX(run_timestamp_utc) AS latest_run,
             SUM(bronze_failed_events) AS bronze_failed_total,
             SUM(silver_quality_failed_checks) AS silver_failed_total
      FROM pv.gold.pipeline_run_diagnostics
      WHERE run_timestamp_utc >= CURRENT_TIMESTAMP - INTERVAL '{lookback_hours}' HOUR
      GROUP BY pipeline_name, status
      ORDER BY pipeline_name, status
    parameters:
      - {name: lookback_hours, type: int, default: 24, range: [1, 720]}

  # === Data quality ===
  data_quality_per_facility:
    description: "Quality / completeness per facility in last window. Use for 'chất lượng dữ liệu', 'trạm nào có vấn đề'."
    synonyms: ["data quality", "chất lượng dữ liệu", "chat luong du lieu", "completeness", "missing data", "thiếu dữ liệu", "thieu du lieu", "null", "vấn đề", "van de", "anomaly", "bất thường", "bat thuong"]
    sample_questions:
      - "Trạm nào có vấn đề data quality"
      - "Missing data by facility this week"
      - "Chất lượng dữ liệu các trạm 7 ngày qua"
    sql_template: |
      SELECT facility_id,
             facility_name,
             AVG(weighted_capacity_factor_pct) AS avg_capacity_factor_pct,
             COUNT(DISTINCT energy_date) AS days_observed,
             SUM(CASE WHEN energy_mwh_daily IS NULL OR energy_mwh_daily = 0 THEN 1 ELSE 0 END) AS zero_or_null_days
      FROM pv.gold.mart_energy_daily
      WHERE energy_date >= CURRENT_DATE - INTERVAL '{window_days}' DAY
      GROUP BY facility_id, facility_name
      ORDER BY zero_or_null_days DESC, avg_capacity_factor_pct ASC
    parameters:
      - {name: window_days, type: int, default: 7}
    suggested_chart:
      chart_type: bar
      x: facility_name
      y: zero_or_null_days

  # === Correlation ===
  weather_energy_correlation:
    description: "Mối tương quan weather-energy theo facility (uses mart_energy_daily as source — has both weather + energy aggregates). Use for 'correlation', 'mối tương quan'."
    synonyms: ["correlation", "tương quan", "tuong quan", "mối quan hệ", "moi quan he", "ảnh hưởng", "anh huong", "yếu tố ảnh hưởng", "yeu to anh huong", "factor", "irradiance", "bức xạ", "buc xa", "weather impact", "scatter", "regression"]
    sample_questions:
      - "Yếu tố nào ảnh hưởng nhất đến hiệu suất tạo điện"
      - "Correlation between cloud cover and energy output"
      - "Mối quan hệ giữa bức xạ và sản lượng"
      - "Weather factors driving production"
    sql_template: |
      SELECT facility_id,
             facility_name,
             AVG(avg_cloud_cover_pct) AS avg_cloud_cover_pct,
             AVG(avg_temperature_c) AS avg_temperature_c,
             AVG(avg_shortwave_radiation) AS avg_irradiance,
             SUM(energy_mwh_daily) AS total_energy_mwh
      FROM pv.gold.mart_energy_daily
      WHERE energy_date >= CURRENT_DATE - INTERVAL '{window_days}' DAY
      GROUP BY facility_id, facility_name
    parameters:
      - {name: window_days, type: int, default: 30}
    suggested_chart:
      chart_type: scatter
      x: avg_cloud_cover_pct
      y: total_energy_mwh
      color: facility_name

# -----------------------------------------------------------------------------
# Per-role table whitelist — narrows discover_schema for each role
# -----------------------------------------------------------------------------

roles:
  admin:
    description: "Full access."
    allowed_tables: ["*"]
    allowed_metrics: ["*"]

  ml_engineer:
    description: "Model + forecast focus."
    allowed_tables:
      - pv.gold.dim_facility
      - pv.gold.fact_energy
      - pv.gold.mart_energy_daily
      - pv.gold.mart_system_kpi_daily
      - pv.gold.mart_forecast_accuracy_daily
      - pv.gold.forecast_daily
      - pv.gold.model_monitoring_daily
      - pv.silver.energy_readings
    allowed_metrics: ["*"]

  data_engineer:
    description: "Pipeline + quality focus."
    allowed_tables:
      - pv.gold.pipeline_run_diagnostics
      - pv.gold.dim_facility
      - pv.gold.mart_system_kpi_daily
      - pv.gold.mart_energy_daily
      - pv.silver.energy_readings
      - pv.silver.weather
      - pv.silver.air_quality
    allowed_metrics:
      - system_overview
      - pipeline_recent_runs
      - data_quality_per_facility
      - facility_metadata_list
      - facility_comparison

  data_analyst:
    description: "Read-only analytics. KPI marts only."
    allowed_tables:
      - pv.gold.dim_facility
      - pv.gold.mart_energy_daily
      - pv.gold.mart_system_kpi_daily
      - pv.gold.mart_weather_impact_daily
      - pv.gold.mart_aqi_impact_daily
      - pv.gold.forecast_daily
    allowed_metrics:
      - system_overview
      - top_facilities_by_energy
      - bottom_facilities_by_capacity_factor
      - peak_hours_pattern
      - facility_locations_map
      - facility_metadata_list
      - facility_comparison
      - forecast_7d
      - forecast_per_facility_7d
      - forecast_by_horizon
      - model_metadata
      - weather_energy_correlation
      - station_daily_report
      - station_hourly_report
      - hourly_energy_trend
      - facility_energy_contribution
      - temperature_vs_energy_correlation
