  facility_energy_specific_day:
    description: "Sản lượng từng trạm trong 1 ngày cụ thể (mặc định: hôm qua). Use for 'trạm nào sản lượng cao nhất hôm qua', 'highest energy yesterday', 'energy yesterday by facility'."
