  - id: easy_04_off_topic_redirect
    question: "What's the weather forecast for New York tomorrow?"
    difficulty: easy
    # Off-topic question — engine should NOT pull lakehouse data, should
    # politely redirect. The redirect message itself mentions "facility"
    # as a topic suggestion, so we only forbid actual data values + tool use.
    answer_must_contain: ["PV"]
    answer_must_not_contain: ["112,134", "MWh", "32,486"]
    expect_data_table: false
    expect_no_tool_calls: true

