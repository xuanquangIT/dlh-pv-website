# Solar Chat v2 — ground-truth battery
# Each case is run end-to-end via the v2 engine. Assertions cover:
#   • answer_must_contain  — substrings the answer text must mention
#   • answer_must_not_contain — refusal phrases that should never appear
#   • expect_kpi.<key>     — KPI cards must include this key (numeric ≈ ground_truth)
#   • expect_chart.format  — "vega-lite" / null
#   • expect_chart.mark    — "bar" / "line" / "circle" / "geoshape"
#   • expect_data_table    — true if a multi-row table should be returned
#   • expect_min_rows      — minimum row_count
#   • expect_source_table  — fully-qualified table name in result.sources
#   • ground_truth_sql     — SQL the runner executes via the same dispatcher to
#                            verify the engine's KPI matches reality (numeric
#                            tolerance from `tolerance_pct`)
#   • ground_truth_key     — which row/column of the gt SQL to compare against
#   • tolerance_pct        — % tolerance for numeric comparison (default 1.0)
#   • difficulty           — easy / medium / hard

cases:
  - id: easy_01_system_overview_en
    question: "Summarize energy performance across all facilities"
    difficulty: easy
    answer_must_contain: ["MWh"]
    answer_must_not_contain: ["i don't have", "tools are offline", "would you like", "i've prepared"]
    expect_kpi:
      total_energy_mwh: gt_total_energy
      avg_capacity_factor_pct: gt_avg_cf
      facility_count: gt_facility_count
    expect_source_table: "pv.gold.mart_system_kpi_daily"
    ground_truth_sql: |
      SELECT
        SUM(total_energy_mwh) AS gt_total_energy,
        AVG(avg_capacity_factor_pct) AS gt_avg_cf,
        MAX(total_facility_count) AS gt_facility_count
      FROM pv.gold.mart_system_kpi_daily
      WHERE kpi_date >= CURRENT_DATE - INTERVAL '30' DAY
    tolerance_pct: 0.5

  - id: easy_02_system_overview_vi
    question: "Tổng quan hệ thống cho tôi 7 ngày qua"
    difficulty: easy
    answer_must_contain: ["MWh"]
    answer_must_not_contain: ["sorry", "tool offline", "không thể"]
    expect_kpi:
      total_energy_mwh: gt_total_energy
    expect_source_table: "pv.gold.mart_system_kpi_daily"
    ground_truth_sql: |
      SELECT SUM(total_energy_mwh) AS gt_total_energy
      FROM pv.gold.mart_system_kpi_daily
      WHERE kpi_date >= CURRENT_DATE - INTERVAL '7' DAY
    tolerance_pct: 1.0

  - id: medium_01_top_facilities
    question: "Top 5 facilities by energy in the last 30 days"
    difficulty: medium
    answer_must_not_contain: ["i don't have", "tools are offline"]
    expect_data_table: true
    expect_min_rows: 5
    expect_source_table: "pv.gold.mart_energy_daily"
    ground_truth_sql: |
      SELECT facility_name, SUM(energy_mwh_daily) AS gt_total
      FROM pv.gold.mart_energy_daily
      WHERE energy_date >= CURRENT_DATE - INTERVAL '30' DAY
      GROUP BY facility_name
      ORDER BY gt_total DESC
      LIMIT 5
    tolerance_pct: 1.0

  - id: medium_02_facility_map
    question: "Show me a map of all facilities"
    difficulty: medium
    expect_chart:
      format: leaflet-map
      mark: map
    expect_data_table: true
    expect_min_rows: 8
    expect_source_table: "pv.gold.dim_facility"
    # Ground truth here just sanity-checks Databricks has the 8 facilities;
    # the engine returns geographic rows so we don't compare via KPI keys.
    ground_truth_sql: |
      SELECT COUNT(*) AS gt_count
      FROM pv.gold.dim_facility
      WHERE is_current = TRUE

  - id: medium_03_daily_report_with_viz
    question: "Show the daily station report for this week"
    tool_hints: ["visualize"]
    difficulty: medium
    answer_must_not_contain: ["i don't have", "would you like", "i've prepared"]
    expect_chart:
      format: vega-lite
    expect_data_table: true
    expect_min_rows: 8        # 8 facilities × N days
    expect_source_table: "pv.gold.mart_energy_daily"

  - id: hard_01_hourly_trend_chart
    question: "Show hourly energy generation trend for this month"
    tool_hints: ["visualize"]
    difficulty: hard
    expect_chart:
      format: vega-lite
      mark: line
    expect_data_table: true
    expect_min_rows: 24       # at least 1 day of hours
    expect_source_table: "pv.gold.fact_energy"

  - id: hard_02_underperformers
    question: "Which facilities underperformed last 30 days by capacity factor"
    difficulty: hard
    answer_must_not_contain: ["i don't have"]
    expect_data_table: true
    expect_source_table: "pv.gold.mart_energy_daily"

  - id: easy_03_greeting
    question: "Hello, who are you?"
    difficulty: easy
    answer_must_contain: ["Solar"]
    expect_data_table: false
    expect_no_tool_calls: true

