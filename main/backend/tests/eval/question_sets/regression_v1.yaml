# ============================================================================
# Bilingual sanity — language quality / no code-switching
# ============================================================================

- id: q_lang_quality_vi
  query: "Phân tích sản lượng các trạm trong tuần qua"
  role: admin
  language: vi
  expectations:
    forbidden_in_answer:
      - "menunjukkan"     # Indonesian
      - "menampilkan"     # Indonesian
      - "sản suất"        # Vietnamese typo (should be "sản xuất")
      - "che khuynh"      # Made-up Vietnamese (should be "che phủ")
      - "kemudian"        # Indonesian "then"
      - "facility-name"   # English code in Vietnamese answer

- id: q_lang_quality_en
  query: "Analyze the energy output across all facilities last week"
  role: admin
  language: en
  expectations:
    forbidden_in_answer: ["trạm", "công suất", "sản lượng"]   # No Vietnamese leak in EN answer

