# ============================================================================
# Edge cases — scope guard, follow-up, meta questions
# ============================================================================

- id: q_meta_who_are_you_vi
  query: "Bạn là ai? Bạn có thể giúp gì cho tôi?"
  role: admin
  language: vi
  expectations:
    forbidden_in_answer: ["Tôi chỉ hỗ trợ"]   # meta question must NOT be refused
    must_mention: ["solar", "năng lượng", "PV", "trạm"]

- id: q_meta_capabilities_en
  query: "What can you do?"
  role: admin
  language: en
  expectations:
    forbidden_in_answer: ["I only support"]
    must_mention: ["solar", "facility", "energy", "forecast"]

- id: q_offtopic_weather_unrelated
  query: "Thời tiết Hà Nội ngày mai thế nào?"
  role: admin
  language: vi
  expectations:
    # This SHOULD be refused — out of scope (Hanoi isn't in the lakehouse)
    # OR redirected to facility-local weather. Either is acceptable.
    forbidden_error_codes: ["AttributeError", "TypeError"]

- id: q_offtopic_pure_chitchat
  query: "1 + 1 bằng mấy?"
  role: admin
  language: vi
  expectations:
    # Pure off-topic — must refuse politely
    must_mention: ["solar", "năng lượng", "không thuộc"]

