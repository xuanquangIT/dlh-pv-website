# Solar Chat regression test question set — v1 baseline / v2 candidate
# Used by: scripts/solar_chat_eval_cli.py
#
# Each question covers a real user-reported failure mode OR a happy-path
# topic that should not regress. Hard expectations auto-fail the eval if
# violated; the LLM-judge handles softer comparisons (wording, completeness).

# ============================================================================
# CRITICAL — 3 user-reported failures (2026-04-26)
# ============================================================================

- id: q_facility_locations_map_vi
  query: "Các trạm điện mặt trời này có vị trí ở đâu, cho tôi xem map"
  role: admin
  language: vi
  expectations:
    must_call_primitive_or_tool: ["get_facility_info", "execute_sql", "discover_schema"]
    must_have_chart_type: ["scatter_geo", "geo"]
    must_have_dataset_columns: ["latitude", "longitude"]
    min_dataset_rows: 1
    forbidden_in_answer: ["Tôi chỉ hỗ trợ", "scope refusal", "không thể"]
    forbidden_error_codes: ["AttributeError", "_load_csv"]

- id: q_facility_locations_map_en
  query: "Where are the solar facilities located? Show me a map."
  role: admin
  language: en
  expectations:
    must_have_chart_type: ["scatter_geo", "geo"]
    must_have_dataset_columns: ["latitude", "longitude"]
    forbidden_error_codes: ["AttributeError", "_load_csv"]

- id: q_factor_ranking_vi
  query: "Các yếu tố ảnh hưởng mạnh mẽ nhất đến hiệu suất tạo điện, list từ cao đến thấp"
  role: admin
  language: vi
  expectations:
    must_call_primitive_or_tool: ["get_energy_performance", "query_gold_kpi", "execute_sql"]
    must_mention: ["bức xạ", "irradiance", "công suất", "cloud", "thời tiết", "weather"]
    forbidden_in_answer: ["menunjukkan", "menampilkan", "sản suất"]
    min_dataset_rows: 1

- id: q_top_wind_chart_vi
  query: "Trạm nào có tốc độ gió trung bình lớn nhất, vẽ biểu đồ so sánh"
  role: admin
  language: vi
  expectations:
    must_have_chart_type: ["bar"]
    must_have_dataset_columns: ["facility_name"]
    min_dataset_rows: 1

