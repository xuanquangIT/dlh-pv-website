# Minimal smoke set — fast CI gate (5 questions covering all 3 reported failures
# + 1 happy path + 1 meta question). Use regression_v1.yaml for full coverage.

- id: q_facility_locations_map_vi
  query: "Các trạm điện mặt trời này có vị trí ở đâu, cho tôi xem map"
  role: admin
  language: vi
  expectations:
    must_have_chart_type: ["scatter_geo", "geo"]
    forbidden_error_codes: ["AttributeError", "_load_csv"]

- id: q_factor_ranking_vi
  query: "Các yếu tố ảnh hưởng mạnh mẽ nhất đến hiệu suất tạo điện"
  role: admin
  language: vi
  expectations:
    forbidden_in_answer: ["menunjukkan", "menampilkan"]

- id: q_top_wind_chart_vi
  query: "Trạm nào có tốc độ gió trung bình lớn nhất, vẽ biểu đồ"
  role: admin
  language: vi
  expectations:
    must_have_chart_type: ["bar"]

- id: q_system_overview_vi
  query: "Tổng quan hệ thống cho tôi"
  role: admin
  language: vi
  expectations:
    forbidden_in_answer: ["Tôi chỉ hỗ trợ"]

- id: q_meta_who_are_you_vi
  query: "Bạn là ai?"
  role: admin
  language: vi
  expectations:
    forbidden_in_answer: ["Tôi chỉ hỗ trợ"]
