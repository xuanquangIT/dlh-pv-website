<!-- Floating chatbot bubble widget -->
<div id="chatbot-bubble-toggle" class="cb-toggle" title="Open Solar AI Chat">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
</div>

<div id="chatbot-bubble-panel" class="cb-panel cb-hidden">
    <div class="cb-header">
        <span class="cb-header-title">Solar AI Chat</span>
        <div class="cb-header-actions">
            <button type="button" id="cb-new-session" class="cb-btn-icon" title="New session">+</button>
            <button type="button" id="cb-toggle-sessions" class="cb-btn-icon" title="Sessions">S</button>
            <a href="/solar-ai-chat" class="cb-btn-icon" title="Open full page">F</a>
            <button type="button" id="cb-close" class="cb-btn-icon" title="Close">X</button>
        </div>
    </div>

    <div id="cb-session-drawer" class="cb-session-drawer cb-hidden">
        <div class="cb-session-toolbar">
            <label class="cb-session-select-all">
                <input type="checkbox" id="cb-select-all-sessions">
                <span>Select all</span>
            </label>
            <button type="button" id="cb-delete-selected" class="cb-delete-selected" disabled>Delete selected</button>
        </div>
        <ul id="cb-session-list" class="cb-session-list"></ul>
    </div>

    <div id="cb-messages" class="cb-messages">
        <p class="cb-empty">Ask a question to start chatting.</p>
    </div>

    <form id="cb-form" class="cb-input-area" action="#" novalidate>
        <select id="cb-role" class="cb-role-select" title="Role">
            <option value="data_analyst">Analyst</option>
            <option value="data_engineer">Engineer</option>
            <option value="ml_engineer">ML Eng</option>
            <option value="admin">Admin</option>
        </select>
        <input type="text" id="cb-input" class="cb-text-input" placeholder="Type a question..." autocomplete="off" required />
        <button type="submit" id="cb-send" class="cb-send-btn" title="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </form>
</div>

<script src="{{ url_for('static', path='js/platform_portal/chatbot-bubble.js') }}" defer></script>
