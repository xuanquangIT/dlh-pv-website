<header id="topbar">
    <div class="crumb">
        <span>PV Lakehouse</span>
        <span>/</span>
        <span class="crumb-active">{{ page_title | default('Dashboard') }}</span>
    </div>

    <form class="search-bar" action="#" method="get">
        <input type="text" name="q" placeholder="Search metrics, models" aria-label="Search">
    </form>

    <div class="top-actions">
        <button type="button" class="btn btn-sec" id="theme-toggle-btn" aria-label="Toggle theme" aria-pressed="false">Dark Mode</button>
        <a class="btn btn-sec" href="/docs" target="_blank" rel="noopener noreferrer">API Docs</a>
        <button type="button" class="btn btn-sec" id="open-logout-modal-btn">Sign Out</button>
        <button type="button" class="btn btn-pri" id="run-pipeline-btn">Run Pipeline</button>
    </div>
</header>
