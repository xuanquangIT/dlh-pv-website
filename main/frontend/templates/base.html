<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}PV Lakehouse{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" defer></script>
</head>
<body>
    <div class="background-layer" aria-hidden="true"></div>
    <header class="site-header">
        <a class="brand" href="/">PV Lakehouse</a>
        <nav class="main-nav">
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/solar-ai-chat">Solar AI Chat</a>
            <a href="/docs" target="_blank" rel="noopener noreferrer">API Docs</a>
        </nav>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
