{% extends "base.html" %}

{% block title %}Dashboard | PV Lakehouse{% endblock %}

{% block content %}
<div class="page-container dashboard-page">
    <div class="page-header">
        <h1 class="page-title">Analytics Dashboard</h1>
        <p class="page-subtitle">Embedded insights powered by Power BI</p>
    </div>

    <div class="content-panel">
        <div id="dashboardContainer" style="height: 850px; width: 100%; border: 1px solid #e5e7eb; border-radius: 8px;">
            <!-- Placeholder before loading -->
            <div id="dashboardLoading" style="display: flex; height: 100%; align-items: center; justify-content: center; flex-direction: column; color: #6b7280;">
                <svg style="animation: spin 1s linear infinite; height: 32px; width: 32px; margin-bottom: 16px; color: #3b82f6;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle style="opacity: 0.25;" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path style="opacity: 0.75;" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p>Loading Power BI capabilities...</p>
                <p style="font-size: 0.8em; margin-top: 8px;">If this takes too long, verify your Azure AD credentials in .env settings.</p>
            </div>
        </div>
    </div>
</div>

<!-- Load Power BI JavaScript API -->
<script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function() {
        const containerDiv = document.getElementById("dashboardContainer");
        const loadingDiv = document.getElementById("dashboardLoading");

        try {
            // Fetch configuration from our backend
            const response = await fetch("/dashboard/embed-info");
            
            if (!response.ok) {
                loadingDiv.innerHTML = `<p style="color: #ef4444;">Failed to fetch configuration. Check backend logs.</p>`;
                return;
            }

            const data = await response.json();
            
            // Check if mock mode is returning dummy token (for local simulation)
            if (data.embed_token === "mock_embed_token_for_local_testing" || !data.report_id) {
                 loadingDiv.innerHTML = `
                    <div style="text-align: center;">
                        <h3 style="color: #ef4444; margin-bottom: 8px;">Configuration Required</h3>
                        <p>The backend requires a valid POWERBI_TENANT_ID, POWERBI_CLIENT_ID, and POWERBI_CLIENT_SECRET.</p>
                        <p style="margin-top: 4px;">To embed your 'pvlakehouse.pbix' file, publish it to a Power BI workspace, and provide the IDs in the .env file.</p>
                    </div>`;
                return;
            }

            loadingDiv.style.display = "none";

            // Configure properties for Power BI embedding
            const models = window['powerbi-client'].models;

            let config = {
                type: 'report',
                tokenType: models.TokenType.Embed,
                accessToken: data.embed_token,
                embedUrl: data.embed_url,
                id: data.report_id,
                permissions: models.Permissions.All,
                settings: {
                    filterPaneEnabled: false,
                    navContentPaneEnabled: true
                }
            };

            // Use the powerbi-client to embed the report into the container element
            let report = powerbi.embed(containerDiv, config);

            // Add event listeners (optional)
            report.on("loaded", function () {
                console.log("Report loaded successfully.");
            });

            report.on("error", function (event) {
                console.error("Error embedding report:", event.detail);
            });

        } catch (error) {
            console.error("Error initializing Power BI:", error);
            loadingDiv.innerHTML = `<p style="color: #ef4444;">Error initializing Power BI embedded dashboard.</p>`;
        }
    });
</script>

<style>
/* Override default max-width for dashboard layout */
.page-shell {
    max-width: 96% !important;
}

/* Spinner animation */
@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}
</style>
{% endblock %}
