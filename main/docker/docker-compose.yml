name: dlhpv_fresh

services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: dlhpv_fresh_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - dlhpv-fresh-postgres-data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - data-net

  trino:
    image: ${TRINO_IMAGE}
    container_name: dlhpv_fresh_trino
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${TRINO_PORT}:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
    restart: unless-stopped
    networks:
      - data-net

networks:
  data-net:

volumes:
  dlhpv-fresh-postgres-data: